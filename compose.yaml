services:
  simadmin:
    build:
      context: .
      dockerfile: Dockerfile
    image: simadmin:local
    container_name: simadmin
    restart: unless-stopped
    privileged: true
    network_mode: host
    environment:
      HOST: "0.0.0.0"
      PORT: "3000"
      RUST_LOG: "info"
      SIMADMIN_CONTAINER: "1"
      SIMADMIN_DATA_DIR: "/data"
      DBUS_SYSTEM_BUS_ADDRESS: "unix:path=/run/dbus/system_bus_socket"
    volumes:
      - simadmin-data:/data
      - simadmin-lpac:/opt/simadmin/lpac
      - /run/dbus/system_bus_socket:/run/dbus/system_bus_socket
      - /run/udev:/run/udev:ro
      - /dev:/dev
      - /sys:/sys:ro

volumes:
  simadmin-data:
  simadmin-lpac:
