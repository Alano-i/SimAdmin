name: Build-OTA-Package

on:
  workflow_dispatch:
    inputs:
      version:
        description: "版本号（例如：1.0.0，auto 表示读取 VERSION）"
        required: false
        type: string
        default: "auto"
      use_upx:
        description: "使用 UPX 压缩"
        required: false
        type: boolean
        default: true
      release_type:
        description: "发布类型"
        required: true
        type: choice
        default: "最新正式版（latest release）"
        options:
          - "最新正式版（latest release）"
          - "预发布版（pre-release）"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  prepare:
    runs-on: ubuntu-24.04
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - uses: actions/checkout@v4
      - id: version
        env:
          INPUT_VERSION: ${{ inputs.version }}
        run: |
          VERSION="$(printf '%s' "$INPUT_VERSION" | tr -d '[:space:]')"
          if [ -z "$VERSION" ] || [ "$VERSION" = "auto" ]; then
            VERSION="$(tr -d '[:space:]' < VERSION)"
          fi
          if ! printf '%s' "$VERSION" | grep -Eq '^[0-9]+(\.[0-9]+){1,3}([-.][0-9A-Za-z.]+)*$'; then
            echo "Invalid version: $VERSION" >&2
            exit 1
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"

  build:
    needs: prepare
    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            runner: ubuntu-24.04
          - arch: arm64
            runner: ubuntu-24.04-arm
    runs-on: ${{ matrix.runner }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.arch == 'arm64' && 'aarch64-unknown-linux-musl' || 'x86_64-unknown-linux-musl' }}

      - uses: actions/setup-node@v4
        with:
          node-version: "24"

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Install native musl toolchain
        run: |
          sudo apt-get update
          sudo apt-get install -y musl-tools
          if [ "${{ inputs.use_upx }}" = "true" ]; then
            sudo apt-get install -y upx-ucl
          fi

      - name: Sync release version
        env:
          VERSION: ${{ needs.prepare.outputs.version }}
        run: |
          printf '%s\n' "$VERSION" > VERSION
          sed -i "s/^version = \"[^\"]*\"/version = \"$VERSION\"/" backend/Cargo.toml
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"$VERSION\"/" frontend/package.json

      - name: Build frontend, backend and OTA package
        run: |
          EXTRA_ARGS=()
          if [ "${{ inputs.use_upx }}" != "true" ]; then
            EXTRA_ARGS+=(--no-upx)
          fi
          ./scripts/build.sh --arch=${{ matrix.arch }} "${EXTRA_ARGS[@]}"
          cp "release/simadmin_${{ needs.prepare.outputs.version }}_${{ matrix.arch }}.tar.gz" \
             "release/simadmin-${{ matrix.arch }}.tar.gz"

      - uses: actions/upload-artifact@v4
        with:
          name: simadmin-${{ matrix.arch }}
          path: release/simadmin-${{ matrix.arch }}.tar.gz
          if-no-files-found: error

  release:
    needs: [prepare, build]
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: simadmin-*
          path: release
          merge-multiple: true

      - name: Generate checksums
        run: |
          cd release
          sha256sum simadmin-amd64.tar.gz simadmin-arm64.tar.gz > SHA256SUMS

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ needs.prepare.outputs.version }}
          name: SimAdmin_v${{ needs.prepare.outputs.version }}
          files: |
            release/simadmin-amd64.tar.gz
            release/simadmin-arm64.tar.gz
            release/SHA256SUMS
          overwrite_files: true
          generate_release_notes: true
          draft: false
          prerelease: ${{ inputs.release_type == '预发布版（pre-release）' }}
          make_latest: ${{ inputs.release_type == '最新正式版（latest release）' }}
          body: |
            ## OTA 更新包

            - `simadmin-amd64.tar.gz`: x86_64 / AMD64
            - `simadmin-arm64.tar.gz`: AArch64 / ARM64
            - `SHA256SUMS`: SHA-256 校验文件

            安装脚本会根据 `uname -m` 自动选择匹配的架构。
